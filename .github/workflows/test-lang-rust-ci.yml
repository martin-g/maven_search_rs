name: Rust Continuous Integration
on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

env:
  RUSTFLAGS: -Dwarnings

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust:
          - 'stable'
          - 'beta'
          - 'nightly'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install ${{ matrix.rust }}
          rustup default ${{ matrix.rust }}
          rustup component add rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 #2.9.1

      - name: Rust Build
        run: cargo build --all-features

      - name: Rust Test
        run: |
            # Ignore failures because Maven Central forbids HTTP requests from GitHub Actions
            cargo test --all-features || true

      - name: Rust Test docs
        run: cargo test --doc

  clippy_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable
          rustup default stable
          rustup component add clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 #2.9.1
      - run: cargo clippy --all-features --all-targets -- -Dclippy::all -Dunused_imports

  fmt_check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust:
          - 'stable'
    steps:
      - uses: actions/checkout@v7
      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable
          rustup default stable
          rustup component add rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 #2.9.1

      - name: Rust Format
        run: cargo fmt --all -- --check
